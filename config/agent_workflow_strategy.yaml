    input_policy: "K 线特征只能由 decision_date 当日及以前 daily cache 计算；return_20d/gt_status 只能用于离线评估，不得进入 DeepSeek evidence pack。"
    prompt_policy: "K 线只作为量价弱提示和反证解释；kline_prompt_flash_v1 未证明组合模式增益，因此不得作为默认正向 gate，也不继续扩大纯 K 线 DS round。"
    lightweight_ml_policy: "current_reaudit_v1 确认 K 线/同行是有用的 Agent 前置量化复核工具，但不得默认升权：best single-stock kline_corr_tushare_peer_regime mean pos20=0.7000、avg20=6.4425、H2026_1=0.4220；tushare_peer_context H2026_1=0.4675，优于纯 K 线 0.3641 和 corr peer/regime 0.4098，但仍低于 0.60。组合 price_core/top15+regime H2026_1=0.6133 但 reject_too_few_samples。不得把本地 ML 分数、Tushare peer、corr peer 或 regime gate 直接转成继续深挖、组合 TopN 默认选择或研究暴露提升。"
    ml_gate_audit_policy: "任何 tree-based/rule-based/learning-to-rank 分数进入 evidence pack 前，必须输出 ml_gate_rule_outcomes：训练/验证/test 时间块、特征白名单、禁用字段、样本数、股票数、日期数、top share、失败块、source_ref_ids 和是否 observe/accepted/rejected。ML gate 单通道不得升级研究分级。"
    cache_policy: "效果优先，项目内缓存总量低于 10GB 可接受；market_5000 当前约 346MB。扩大到 1000/3000/全 A 时优先离线缓存 daily K-line、corr TopK 和真实行业/概念/地域图谱，接近 10GB 再做分片或列式压缩。"
    feature_groups:
      short_kline: "3/5/10/20 日收益与波动、RSI、MACD、ATR、量比、布林位置、20 日均值回归、方向反转率、效率比、当前连涨连跌强度。"
      long_kline: "60/120/240 日收益、长周期回撤、20/60/120/240 均线结构、MA200/MA240 距离、斜率、长周期区间位置和效率比。"
      cycle_kline: "MA20/MA60 穿越次数、区间位置、布林位置、均值回归 z 值、短长波动比、区间宽度、方向反转率、趋势效率比、上涨日占比。"
      peer_kline: "同组/候选池相对收益、正收益广度、MA200 广度、相对波动；接入行业/概念/地域图谱前不得宣称真实同行规则。"
      tushare_industry_region_peer: "用户授权 Tushare stock_basic 离线缓存中的 industry/area 分组，剔除自身后计算同行收益、广度、MA200、新闻预警/机会均值和自身相对同行关注缺口；当前只作单支复核/反证候选。"
    candidate_rules:
      - rule_id: kline_20d_pullback_observe_v1
        status: observe_candidate
        condition: "kline_return_20d <= -10.1231"
        action: "作为回撤后修复候选提示；必须同时检查同行确认、新闻/财报风险、Book Skill 和数据缺口，不得单独升级。"
        evidence: "kline_channel_multiscale_exploration_v1: valid pos20=0.7107 vs baseline=0.5782；test pos20=0.5467 vs baseline=0.4926。local_kline_news_fin_peer_interactions_v1 复核：test loss_gt5=0.2461 vs baseline=0.2779，样本3812、股票461；但 H2026_1 pos20=0.4904，仍有时间块风险。kline_prompt_flash_v1: 96 Flash cards invalid=0 leak=0 total_tokens=519894；kline_weak_prompt 没有主动暴露，但 portfolio cash_adj_avg=0.2100 低于 no_kline=0.2551，single_stock 只小幅改善均值且正收益率不变，因此不升级默认。"
      - rule_id: corr_peer_kline_single_stock_observe_v1
        status: observe_candidate_single_stock_only
        condition: "time-safe 120-trading-day corr Top10 peer K-line features improve single_stock additive model"
        action: "只能作为单支盯盘/复核的候选证据；必须展示 H2026_1 未通过反证，不得用于组合 TopN 默认排序。扩大前先缓存 corr TopK，并加入市场 regime/date gate。"
        evidence: "lightweight_ml_channel_experiment_v2: kline_corr_peer_regime single_stock mean pos20=0.6832 avg20=7.3612, but H2026_1 pos20=0.3921. current_reaudit_v1: kline_corr_peer_regime mean pos20=0.6797 avg20=5.7191 H2026_1=0.4098; kline_corr_tushare_peer_regime mean pos20=0.7000 but H2026_1=0.4220. Portfolio corr-peer/regime/top15 H2026_1=0.3152 in v2 and remains observe/reject-thin, so only single-stock review context."
      - rule_id: tushare_industry_area_peer_single_stock_observe_v1
        status: observe_candidate_single_stock_only
        condition: "Tushare stock_basic industry/area peer context improves single_stock local additive model, but latest block remains below acceptance threshold"
        action: "作为单支盯盘/复核的真实行业/地域同行背景；若行业广度弱、目标相对同行落后或同行新闻更热但目标沉默，应作为反证。不得单独触发继续深挖或增加研究暴露，不得用于组合 TopN 默认选择。"
        evidence: "lightweight_ml_peer_graph_experiment_v1/current_reaudit_v1: tushare_peer_context single_stock mean pos20=0.6877 avg20=6.2355 H2026_1=0.4675 status=observe_candidate; better than pure K-line H2026_1=0.3641 and corr_peer_regime H2026_1=0.4098, but below 0.60."
      - rule_id: tushare_peer_portfolio_not_ready_v1
        status: rejected_for_default_portfolio
        condition: "Tushare industry/area peer context used for portfolio_pool TopN/rank selection"
        action: "组合模式只作为对照和解释，不进入默认 TopN；top3/regime 好看但样本过薄时必须标灰。下一轮需加入概念、指数、产业链、新闻共现和最小样本/日期数约束。"
        evidence: "lightweight_ml_peer_graph_experiment_v1: tushare_peer_context portfolio top15/regime H2026_1 around 0.4000 and top3+regime status reject_too_few_samples; portfolio task not passed."
      - rule_id: kline_low_reversal_deep_pullback_micro_candidate_v1
        status: reject_too_few_samples
        condition: "kline_direction_reversal_rate_20d <= 0.3500 and kline_return_20d <= -18.0609"
        action: "可进入小样本 DS 复核池，但必须标注样本不足；不得默认升权。"
        evidence: "kline_channel_multiscale_exploration_v2: test pos20=0.6591 vs baseline=0.4926, avg20=5.8931, but test samples=88 below acceptance floor."
      - rule_id: kline_240d_deep_discount_not_alpha_v1
        status: rejected_for_positive_gate
        condition: "kline_ma_gap_close_240 <= -23.6408"
        action: "不得作为 240 日深折价正向规则；只作为反证或待复核背景。"
        evidence: "kline_channel_multiscale_exploration_v2: valid pos20=0.6675 but test pos20=0.4541 below baseline=0.4926."
      - rule_id: regime_date_gate_overfit_risk_v1
        status: observe_with_strict_sample_floor
        condition: "validation-selected regime/date gate"
        action: "只有同时满足最小样本、最小决策日期数、跨时间块一致性时才可进入 DS 复核；不得默认启用。"
        evidence: "lightweight_ml_channel_experiment_v2/current_reaudit_v1: price_core/top15+regime mean pos20=0.7023 and H2026_1=0.6133, but aggregate status reject_too_few_samples; kline_corr_peer_regime+regime H2026_1 often drops below baseline. 好看的 regime gate 只能灰色展示，不能作为默认组合选择。"
      - rule_id: kline_long_deep_drawdown_not_alpha_v1
        status: rejected_for_positive_gate
        condition: "kline_return_60d <= -16.9912"
        action: "不得作为长周期深跌正向规则；只能作为风险/复核提示。"
        evidence: "valid pos20=0.5810 略高于 baseline=0.5782，但 test pos20=0.3814 明显低于 baseline=0.4926。"
      - rule_id: kline_cycle_volatility_rebound_observe_v1
        status: observe
        condition: "kline_volatility_ratio_20_60 >= 1.2560 and kline_trend_consistency_20d <= 0.35"
        action: "作为震荡/波动扩张复核提示，不得默认加权。"
        evidence: "test pos20=0.5226，比 baseline=0.4926 高约 0.0300；样本和稳定性不足。"
      - rule_id: peer_kline_low_breadth_not_ready_v1
        status: rejected_for_default
        condition: "peer_kline_group_above_ma200_rate <= 0.1757"
        action: "当前本地 500 股候选池横截面规则不进入默认策略；待 Tushare 行业/概念/地域图谱后重测。"
        evidence: "train/valid 看似较好，但 test 命中样本为 0。local_kline_news_fin_peer_interactions_v1 进一步显示 kline_pullback_peer_confirmed test pos20=0.3919 低于 baseline=0.4926，说明当前 peer K 线不是真实同行确认。"
