        condition: "ds_news_risk_score < 0.6 and ds_news_uncertainty_score < 0.6"
        action: "可作为现金防守/放弃弱证据日期的辅助条件；不能替代 Book Skill、量价和同行确认。"
        evidence: "63-row matched-news panel: cash_blended_positive_20d_rate 0.6667 vs baseline 0.5238，但 raw_avg_return_20d 低于 baseline。"
      - rule_id: news_questionnaire_positive_score_not_alpha_v1
