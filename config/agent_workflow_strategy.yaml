        condition: "financial_surprise_score <= 0.0 and news_missing_rate < 0.8"
        action: "作为新闻+财报通道的宽风险/复核样本，不作为财报风险归零触发条件；用于测试 DS 是否能在普通新闻可用时给出更稳的复核判断。"
        evidence: "financial_report_threshold_search: rows=901 unique_stocks=108 top_stock_share=0.0244 pos_delta=-0.0765 loss_delta=+0.0182 avg_news_missing=0，但只覆盖 2 个时间块。financial_report_news_available_probe_flash_v1: 48 cards invalid=0 total_tokens=251986 leak_audit=0；news_plus_financial_report_guarded vs no_financial portfolio cash_adj 0.4682 vs 0.2642，single 0.4311 vs 0.2961，但 guarded exposure=0 且仅 6 stock-date。financial_report_next_probe_flash_small_shard_v1 纳入 strict risk/multi-report/neutral 后，guarded delta 缩小到 portfolio +0.0907、single +0.0259；只能继续观察，不能作为默认风险归零或正向规则。"
      - rule_id: financial_report_only_no_upgrade_without_confirmation_v1
        status: safety_guardrail_observe
        condition: "variant/input context is financial_report_only, or ordinary news/peer/Python/Book Skill confirmation is unavailable"
        action: "财报单通道不得把研究分级升级到继续深挖；最多用于放入观察、信息不足、反证和后续复核项。若 Agent 给出升级，后处理或下一轮 prompt 应压回观察/信息不足，除非普通新闻、同行、Python gate 和 Book Skill 同时确认。"
        evidence: "financial_report_news_available_probe_flash_v1 中 financial_report_only 在 portfolio_pool H2026_1 产生 1 张继续深挖/增加研究暴露卡，后验暴露结果为 -0.9；说明单独财报证据存在过度乐观风险。financial_report_next_probe_flash_small_shard_v1 中 financial_report_only single_stock cash_adj=0.2129，低于 no_financial_report_channel 0.3603；说明财报单通道在单支模式也可能增加噪音。"
      - rule_id: financial_multi_report_review_v1
        status: observe_review_trigger
        condition: "financial_report_event_count >= 3"
        action: "触发专门复核，检查是否同日多份定期报告/审计/修正公告导致信息密度升高；不作为单独正向规则。"
        evidence: "financial_report_local_stratified_analysis: rows=1020 unique_stocks=40 pos_delta=+0.0394 loss_delta=-0.0356；覆盖较宽但提升温和，更像复核触发器。"
