        action: "不得因为窗口放宽后覆盖提高而升级研究分级或研究权重；若要使用，只能标为历史财报背景/诊断候选，并要求真实财报/公告 backfill 后重新审计。"
        evidence: "financial_asof_window_expansion_v1 after 100-stock P0 backfill: 30/60/90/180/365d sweep produced 0 accepted, 7 observe, 2 reject_concentrated, 41 rejected_or_diagnostic_only; high-ranker H2026 365d coverage rose to 38.42%, but observe rules remain safety/risk-review only."
      - guard_id: financial_high_risk_review_no_raise_v1
        status: observe_review_context_not_hard_filter
        condition: "financial_high_risk_guard fires inside 30d or 60d as-of window"
        action: "作为财报复核/不确定性 checklist；不得单独输出暂时剔除，也不得作为 hard filter 或固定 no-raise。若目标新闻、公告、同行、BookSkill、K线/筹码和财报明细共同支持，可保持观察但必须解释冲突。"
        evidence: "financial_safety_hygiene_gate_after_p0_200_v1: high-ranker safety gate has accepted_review_no_raise_candidate=0, observe_review_only=3, observe_filter_candidate=2. P0=100 had stronger downside signal, but P0=200 downgraded the strict acceptance, so keep review context only."
    candidate_rules:
      - rule_id: financial_report_matched_clears_missing_flag_v1
        status: accepted_data_hygiene
        condition: "financial_report_join_status == event_window_matched or financial_report_event_count > 0"
        action: "从 data_missing_flags 中移除旧 financial_publish_date_missing 标记；不得在理由中说财报披露日缺失。"
        evidence: "financial_report_matched_ablation_flash_v1 发现旧 data_gaps 与已匹配财报事件冲突；financial_report_matched_evidence_fix_flash_v2 修复后不再误报。"
      - rule_id: financial_negative_surprise_overheat_guard_v1
        status: observe_concentrated_risk_guard
        condition: "financial_surprise_score < -0.4 and prior_return_20d/RSI/volatility shows overheat and Book Skill unresolved"
        action: "作为高波动风险复核，不得因 Python pullback 或相对强度直接升级；若触发但股票集中度不足，必须保持 observe，不固化为默认规则。"
        evidence: "financial_report_local_stratified_analysis: rows=68 unique_stocks=3 avg20=8.8916 but pos_delta=-0.1018 and loss_delta=+0.2419；均值被少数样本拉高，风险和集中度不支持升级。"
      - rule_id: financial_positive_surprise_not_alpha_v1
