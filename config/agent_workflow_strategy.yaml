        action: "正向财报惊喜只能作为观察理由，不能单独提高研究分级或研究暴露。"
        evidence: "financial_report_local_stratified_analysis: strict positive_surprise_low_risk_candidate rows=0；positive_surprise_weak_context rows=173 unique_stocks=2 pos_delta=-0.2182 loss_delta=+0.2179。"
      - rule_id: financial_quality_risk_high_guard_v1
        status: observe_concentrated_risk_guard
        condition: "financial_quality_risk_score >= 0.6"
