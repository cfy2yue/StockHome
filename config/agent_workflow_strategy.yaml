        condition: "ds_news_opportunity_score high or ds_news_net_score >= 0"
        action: "不得直接增加正向权重；只可进入解释或等待跨通道确认。"
        evidence: "63-row matched-news panel: net_non_negative_only raw_avg_return_20d -2.1056，opportunity_high_risk_controlled raw_avg_return_20d -0.1650。deepseek_news_risk_uncertainty_quality_lpm20_v1 中完整问卷 portfolio cash_adj_avg=-0.6435，低于 no_news=-0.5563，且 000681 opportunity=1/net=0.5 后 20d=-14.05。"
      - rule_id: news_questionnaire_reversal_friction_not_hard_negative_v1
        status: accepted_branching_requirement_not_alpha
        condition: "high-ranker reversal/chip candidate has high ds_news_risk_score, high uncertainty, ST/inquiry/abnormal-volatility or other explicit risk words"
        action: "不得机械暂时剔除或降至 0；必须先分叉判断 explicit_negative_event 与 reversible_reversal_friction。若 K线/筹码/同行反转证据强但新闻风险高，只能作为高风险观察或要求更多证据，不能把风险分直接当硬 veto。"
        evidence: "news_hq_positive_fresh24_questionnaire_v1: fresh24 neutralized no_news control plus questionnaire showed full_agent portfolio avg20=0.4940 below no_news=0.9709; ds_news_net_score corr_return20=-0.6604; 000908 high-risk news caused full_agent lower weight on a posterior +165.28 reversal sample, contributing approx -8.264 to paired full_agent-no_news delta."
      - rule_id: news_questionnaire_branch_case_auditor_v1
        status: accepted_checklist_not_alpha
        condition: "news_semantic_questionnaire is available for a decision point"
        action: "把新闻语义先转为 explicit_negative_event / reversible_reversal_friction / routine_official_low_signal / soft_gap / peer_diffusion / policy_region_direct_support / target_specific_positive_event 分叉，并附 prior-only 相似案例元信息；Agent 只能把它作为 checklist、反证、confidence discount 或防 false-veto 材料，不得单独升权。"
        evidence: "news_questionnaire_branch_case_audit_v1: 159 questionnaire rows/102 stocks, 436 prior-similar case links, agent preview future leak scan=0. primary branches: unclassified=53 routine_official=40 soft_gap=23 reversal_friction=21 peer_diffusion=9 explicit_negative=7 policy_region=6. reversal_friction prior pos20=0.8125/excess=24.2055 but H2026 pos20=0.2000/excess=-1.8759; soft_gap weak in prior/H2026; policy_region weak/tiny; no branch promoted as alpha."
