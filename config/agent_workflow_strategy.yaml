strategy_workflow_version: agent_workflow_strategy_v1
updated_at: "2026-06-28"
research_only: true
no_broker: true
no_auto_trade: true
allow_actionable_research_suggestions: true
no_auto_execution_or_guaranteed_return: true
default_portfolio_ranker: rev_plus_chip_core

default_single_stock_workflow:
  workflow_id: single_stock_watch_v2_risk_peer_bookskill_auditor
  priority: P0
  default_role: "DeepSeek Agent Auditor reads risk review, peer/industry, BookSkill, news branch, financial as-of and chip context first; opportunity tools are grey reference unless cross-channel confirmation is present."
  promoted_components:
    - branch_aware_risk_review
    - news_branch_case_context
    - peer_context_review
    - grounded_bookskill_review
  diagnostic_components:
    - single_stock_opportunity_scorer_v2
    - single_stock_kline_frequency_tool_v1
  offline_diagnostic_components:
    - nonprice_risk_overlay_v1
  component_boundaries:
    opportunity_tool: "grey reference only after p0_acceptance paired diagnostics; do not use as P0 default grade/exposure raiser because it hurt H2026 and produced lowered_positive/raised_negative cost."
    kline_frequency_tool: "fixed rev_chip_core can be used as observation/risk checklist and recheck-frequency context; learned short/long/cycle/peer/multiscale K-line variants failed H2026 and must not independently upgrade research grade."
    nonprice_risk_overlay: "Not default-visible for P0 single_stock. 3-panel Flash on/off rejected broad overlay for P0 because single_stock delta=-2.049474 with raised_negative=4 and lowered_positive=2. Keep only as offline diagnostic or explicit research test; CLI defaults this overlay to portfolio_pool only. For P1/P2 it may remain a conflict checklist, never alpha or grade raiser."
    risk_review_queue: "review/no-raise context, not hard filter and not alpha."
    news_branch_case_context: "checklist for explicit negative event vs reversible reversal friction; not a standalone positive threshold."
    peer_context_review: "strong P0 audit component in paired diagnostics, but latest-block results still require rolling confirmation."
    grounded_bookskill_review: "use grounded strategy IDs as audit/checklist material; never use ungrounded BookSkill as standalone positive alpha."
    financial_report_context: "as-of safety/hygiene and variance review only until fresh panels prove alpha."
  latest_component_diagnostic:
    report: reports/date_generalization/p0_component_paired_diagnostics_v1.md
    decision: "Default P0 should prioritize risk/peer/BookSkill/news-branch audit; demote single_stock_opportunity_scorer_v2 to diagnostic/grey reference until false-veto and bad-raise costs improve."
  latest_kline_frequency_diagnostic:
    report: reports/date_generalization/single_stock_kline_frequency_tool_v1.md
    decision: "Keep K-line/related-stock K-line as checklist only; do not promote learned multiscale K-line alpha. Fixed rev_chip_core is allowed as weak observe/risk context."
  latest_nonprice_risk_overlay_diagnostic:
    report: reports/date_generalization/nonprice_risk_overlay_v1.md
    flash_smoke_report: reports/date_generalization/nonprice_risk_overlay_flash_smoke_v1_findings.md
    paired_report: reports/date_generalization/nonprice_risk_overlay_flash_smoke_v1_paired.md
    three_panel_report: reports/date_generalization/nonprice_risk_overlay_3panel_flash_v1_findings.md
    three_panel_paired_report: reports/date_generalization/nonprice_risk_overlay_3panel_flash_v1_paired.md
    agent_preview: reports/date_generalization/nonprice_risk_overlay_v1_agent_preview.jsonl
    decision: "Supersedes the 24-card smoke: broad overlay is rejected as P0 default because 3-panel single_stock paired delta was negative across all panels. Keep portfolio_pool-only CLI default and use P0 only for explicit offline diagnosis."

default_candidate_comparison_workflow:
  workflow_id: candidate_comparison_ranker_anchor_v2
  priority: P1
  same_sector_anchor: rev_chip_core
  cross_sector_anchor: rank_avg_rev_watch
  cross_sector_anchor_formula: "z_within_candidate_group(rev_chip_core) + z_within_candidate_group(single_watch_proxy)"
  default_agent_protocol: ranker_anchor_agent
  default_output_policy: "Give Top1/Top2 research priority and per-candidate grade; cross-sector must not claim a single certain winner."
  free_agent_sorting_status: research_control_only
  evidence_policy:
    - "default_ranked_candidates is a ranking anchor, never a future label."
    - "Agent can override only with explicit hard counter-evidence and must write rank_override_audit."
    - "User-facing grades remain limited to allowed_user_grades."

allowed_user_grades:
  - 继续深挖
  - 放入观察
  - 暂时剔除
  - 信息不足

allowed_internal_actions:
  - 增加研究暴露
  - 降低研究暴露
  - 保持观察
  - 转入现金
  - 信息不足不动作

allowed_user_operations:
  - 试探买入
  - 加仓
  - 持有
  - 减仓
  - 卖出/不买
  - 等待不买
  - 补数据后再定

model_policy:
  training_rounds: deepseek-v4-flash
  ablation_and_error_reflection: deepseek-v4-flash
  formal_user_inference: deepseek-v4-pro
  final_acceptance: deepseek-v4-pro
  max_workers_auto: true
  concurrency_policy:
    default_max_workers_arg: 0
    effective_workers_formula: "min(evidence_pack_count, model_concurrency_limit[model]) when max_workers <= 0"
    deepseek-v4-flash_limit: 2500
    deepseek-v4-pro_limit: 500
    use_high_concurrency_for_training_search: true
    reduce_next_shard_on_429_or_timeout: true

training_paradigm:
  status: supervised_ranker_agent_auditor_mainline
  core_loop: "future-label evaluation -> train/calibrate date_regime_gate and supervised rankers -> emit compact tool summaries, feature contributions, uncertainty and rule_outcomes -> DeepSeek Agent audits conflicts and writes research-only decision cards -> backtest and update tool/policy versions"
  rationale: "Natural-language reflection, prompt changes and rule grids have not produced stable alpha. Experience must be converted into time-safe labels, calibrated rankers, hard guards, or explicit rule_outcomes before it can improve the next round."
  cursor_handoff_20260627:
    accepted_default_portfolio_ranker: rev_plus_chip_core
    default_ranker_status: default_combo_ranker_yellow
    supporting_reports:
      - reports/date_generalization/chip_augmented_ranker_v1.md
      - reports/date_generalization/behavioral_chip_ic_audit.md
      - reports/date_generalization/supervised_ranker_experiment_v2.md
      - reports/date_generalization/multi_horizon_signal_scan_h2026.md
      - reports/date_generalization/single_stock_product_mvp_v1.md
    production_sync:
      chip_core_cache: data/date_generalization_cache/market_5000/tushare_chip_core_features.csv.gz
      dual_mode_default_preset: rev_plus_chip_core
      quant_tool_id: portfolio_rev_chip_core_ranker
      evidence_fields:
        - chip_signal_summary
        - chip_features
        - quant_tool_summaries
    honest_boundary: "rev+chip_core is a no-harm default ranker that preserves 2023-2025 evidence and reduces H2026 loss, but H2026 cost-adjusted combo still is not green; Agent must audit news/bookskill/peer/financial conflicts and may abstain."
  rev_chip_sampler_update_20260627:
    structured_veto_report: reports/date_generalization/rev_chip_agent_veto_reason_diagnostics.md
    positive_confirmation_report: reports/date_generalization/positive_confirmation_sampler_findings_v1.md
    default_portfolio_ranker: rev_plus_chip_core
    default_row_gate: none
    observe_only_row_gates:
      - cross_channel_min2
      - positive_confirmation_min2
    rejected_row_gates:
      - positive_confirmation_min1_no_hard
      - positive_confirmation_min2_no_hard
    key_result: "positive_confirmation_min2 only slightly improved mean avg20 but lowered pos20 and did not improve H2026 pos20; no_hard variants degraded sharply."
    next_focus: "Do not mechanically filter all conflicts. Build conflict-quality labels and improve news/announcement, financial-report, peer, and funding channels so Agent can distinguish acceptable reversal friction from real veto risk."
