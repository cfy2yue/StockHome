    leakage_policy: "conflict_quality_context may expose only prior-block rule_status and agent_use. It must not expose return_20d, avg20, pos20, pool_excess, loss_gt5, gt_status, or same-block labels."
    ablation_policy: "no_memory, python_only, and quant_tool_summary_only hide conflict_quality_context."
