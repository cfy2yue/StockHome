        evidence: "financial_report_local_stratified_analysis: rows=372 unique_stocks=3 avg20=1.4658 median20=-2.46 pos_delta=-0.2400 loss_delta=+0.2385；风险明显但股票集中度不足。"
      - rule_id: financial_risk_to_zero_guard_v1
        status: observe_candidate
        condition: "financial_quality_risk_score >= 0.6 or (financial_surprise_score <= -0.4 and overheat), and Book Skill/peer/news do not confirm recovery"
        action: "下一轮候选：优先把研究暴露压到 0 或信息不足不动作，而不是保留小非零权重；必须用 20-40 行、至少 10 只股票验证；未通过前不得作为正向 alpha。严格高风险样本集中时，不得硬扩样，应加入新闻可用宽风险和 neutral control。"
        evidence: "financial_report_balanced_sample_flash_v1: 48 cards invalid=0 exposure=0；financial-only 识别风险但小非零权重使 portfolio cash_adj=-0.0251，弱于 no_financial 0.2713。financial_report_risk_guard_diversified_flash_mini_v1: 64 cards invalid=0 total_tokens=344175；guarded vs plain news_plus_financial portfolio cash_adj 0.2175 vs 0.1378，single_stock 0.2709 vs 0.1213，guard triggered 8 packs；但 portfolio 仍弱于 no_financial 0.4154 且 exposure=0，只能保持 observe。financial_report_next_probe_flash_small_shard_v1: 64 cards invalid=0 after resume, total_tokens=357300；guarded vs no_financial portfolio 0.3989 vs 0.3082, single 0.3862 vs 0.3603；所有 exposure=0，组合改善但单支仅小幅改善，因此继续 observe，不升级默认。外部审阅指出 strict risk 只有少数股票且 news_missing=1.0，已用 threshold search 加入 nonpositive_surprise_news_available 宽风险控制。"
      - rule_id: financial_nonpositive_surprise_news_available_v1
