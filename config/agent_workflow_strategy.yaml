    report: reports/date_generalization/conflict_quality_labels_v1.md
    detail: reports/date_generalization/conflict_quality_labels_v1_detail.csv
    single_conflict_summary: reports/date_generalization/conflict_quality_labels_v1_label_summary.csv
    combo_summary: reports/date_generalization/conflict_quality_labels_v1_combo_summary.csv
    offline_rule_draft: reports/date_generalization/conflict_quality_labels_v1_agent_rules.json
    candidate_rows: 28074
    scope: "rev_plus_chip_core score_quantile>=0.80"
    key_findings:
      - "kline_risk_conflict is acceptable_reversal_friction in high ranker candidates: avg20=9.3512, pos20=0.6752, pool_excess=2.6942."
      - "news_missing, financial_no_recent_event, bookskill_missing_or_weak, and chip_overhang are mostly downweight/veto signals unless strong cross-channel catalyst exists."
