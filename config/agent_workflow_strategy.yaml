        condition: "news_missing_rate high, questionnaire missing, or source-quality weak without explicit negative evidence"
        action: "写入不确定性和信息缺口；不得单独上调或下调方向判断。若量化工具为 accepted candidate，只允许作为 partially_adopted/needs_confirmation 的软缺口处理，最终仍需同行、财报、BookSkill 或风险反证共同裁决。"
        evidence: "news_questionnaire_flash_four_quadrant_v1: 6/6 四象限样本问卷补齐，future leak=0；full_channel_quant_news_softgap_2panel_flash_v1 中 full+quant portfolio cash-adjusted avg20 从 0.6314 改善到 1.0050，但 exposure_cards=0。four_quadrant_softgap_flash_v1 显示 soft-gap 可提升 partially_adopted 到 3/6，但 full+quant avg20=-0.1636 低于 without_quant=-0.0860，因此这是 prompt hygiene，不是正向 alpha。"
