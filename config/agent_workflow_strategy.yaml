    decision_policy:
      - "财报事件是高可信新闻类子通道，但未完成消融验证前不得作为正向 alpha。"
      - "财务质量风险、披露质量弱、问询/修正/非标审计可作为反证复核。"
      - "financial_report_missing_rate 高时只能提高不确定性，不能当作好消息。"
      - "普通新闻与官方财报/公告冲突时，官方披露优先，公开聚合新闻降权。"
      - "缺少 ann_date/f_ann_date 或无法证明 available_at<=decision_time 的字段不得进入 walk-forward 正负判断。"
      - "若 financial_report_join_status=event_window_matched 或 financial_report_event_count>0，不得继续声称该决策点财报披露日缺失；但仍可因财务质量风险、负惊喜、Book Skill 未解析等降权。"
      - "financial_report_only 只能作为复核/反证/不确定性通道；缺少普通新闻、同行、Python gate 和 Book Skill 共同确认时，不得单独升级研究分级或研究暴露。"
      - "365d 财报窗口不得作为默认正向确认；只能作为历史财报背景诊断，默认事件窗口仍保持 90d 或更短，直到真实披露日数据扩容后重新验证。"
      - "30/60d financial_high_risk_guard 可作为财报复核/不升权 checklist，但不得机械剔除；exclude_high_risk 仅 observe，不能硬过滤。"
      - "fina_audit audit_opinion 可作为审计意见/披露质量/风险复核材料；标准无保留不得当正向 alpha，非标/保留/无法表示不得机械硬剔除。"
      - "income/cashflow/balancesheet 三表 variance 可作为财报解释、现金流/负债/利润质量复核材料；三表覆盖或低风险不得默认升权。"
    required_ablation:
      - no_financial_report_channel
      - financial_report_only
      - news_plus_financial_report
      - news_plus_financial_report_guarded
